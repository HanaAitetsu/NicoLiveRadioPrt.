<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube LIVE ラジオ（試作版）</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .radio-box {
            border: 4px solid #cc0000;
            border-radius: 15px;
            padding: 30px;
            display: inline-block;
            background-color: #2b2b2b;
            min-width: 480px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dial-container {
            margin: 20px 0;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #cc0000;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.2s;
        }
        button:hover { background-color: #ff0000; }
        button:active { transform: scale(0.95); }
        #player-container { margin-top: 25px; }
        #info { margin-top: 15px; font-size: 16px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="radio-box">
    <h2>📻 YouTube LIVE 専用ラジオ（試作機）</h2>
    <p style="color: #aaa; font-size: 14px;">ジャンル（周波数）を選んでチューニングしてください</p>
    
    <div class="dial-container">
        <button onclick="tuneIn('ニュース')">📰 ニュース</button>
        <button onclick="tuneIn('作業用BGM')">☕ BGM</button>
        <button onclick="tuneIn('ライブカメラ')">📷 ライブカメラ</button>
        <button onclick="tuneIn('ゲーム配信')">🎮 ゲーム</button>
    </div>
    
    <div id="info">周波数を合わせてください...</div>
    <div id="player-container"></div>
</div>

<script>
function tuneIn(keyword) {
    const infoDiv = document.getElementById('info');
    const container = document.getElementById('player-container');
    
    infoDiv.innerText = `「${keyword}」の電波を受信中...`;
    container.innerHTML = ""; 

    // YouTubeの検索パラメータ（sp=EgJAAQ%253D%253D は「ライブ配信中のみ」に絞り込むフィルター）
    const encodedKeyword = encodeURIComponent(keyword);
    const searchUrl = `https://www.youtube.com/embed?listType=search&list=${encodedKeyword}&sp=EgJAAQ%253D%253D&autoplay=1`;

    // YouTubeの埋め込みプレイヤーを生成
    // ※YouTubeの仕様上、検索結果の一番上にヒットした「現在ライブ中」の動画が自動で流れます
    container.innerHTML = `
        <iframe src="${searchUrl}" 
                width="480" 
                height="270" 
                style="border:4px solid #111; background:#000;" 
                allow="autoplay; encrypted-media; picture-in-picture" 
                allowfullscreen>
        </iframe>`;
}
</script>

</body>
</html>
